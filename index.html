<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desserts</title>
  </head>
  <body>
    <div class="products-section">
      <h1 class="title">Desserts</h1>

      <div class="products-container">
        <article class="product-card">
          <img src="img6.jpg" class="product-image" />

          <button class="add-btn" data-id="6">Add to Cart</button>

          <p class="product-category">Waffle</p>
          <h3 class="product-name">Waffle with Berries</h3>
          <p class="product-price">$6.50</p>
        </article>

        <article class="product-card">
          <img src="img5.jpg" class="product-image" />

          <button class="add-btn" data-id="1">
            <span>Add to Cart</span>
          </button>

          <p class="product-category">Crème Brûlée</p>
          <h3 class="product-name">Vanilla Bean Crème Brûlée</h3>
          <p class="product-price">$7.00</p>
        </article>

        <article class="product-card">
          <img src="img1.jpg" class="product-image" />

          <button class="add-btn" data-id="2">Add to Cart</button>

          <p class="product-category">Macaron</p>
          <h3 class="product-name">Macaron Mix of Five</h3>
          <p class="product-price">$8.00</p>
        </article>

        <article class="product-card">
          <img src="img2.jpg" class="product-image" />

          <button class="add-btn" data-id="3">Add to Cart</button>

          <p class="product-category">Tiramisu</p>
          <h3 class="product-name">Classic Tiramisu</h3>
          <p class="product-price">$5.50</p>
        </article>

        <article class="product-card">
          <img src="img3.jpg" class="product-image" />

          <button class="add-btn" data-id="4">Add to Cart</button>

          <p class="product-category">Baklava</p>
          <h3 class="product-name">Pistachio Baklava</h3>
          <p class="product-price">$4.00</p>
        </article>

        <article class="product-card">
          <img src="img4.jpg" class="product-image" />

          <button class="add-btn" data-id="5">Add to Cart</button>

          <p class="product-category">Pie</p>
          <h3 class="product-name">Lemon Meringue Pie</h3>
          <p class="product-price">$5.00</p>
        </article>
      </div>
    </div>
    <div class="cart-section">
      <h2 class="cart-title">Your Cart (0)</h2>

      <div class="empty-cart">
        <div class="empty-cart-image">
          <!-- ovde kasnije ubacuješ sliku -->
          <img src="cartimg.jpg" />
        </div>

        <p class="empty-cart-text">Your added items will appear here</p>
      </div>
    </div>

    <script type="module" src="dessert.js"></script>
  </body>
</html>
